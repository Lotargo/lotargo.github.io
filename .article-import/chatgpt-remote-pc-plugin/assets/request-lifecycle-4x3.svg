<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Request lifecycle</title><desc id="desc">Six stages from a user request in ChatGPT to remote PowerShell execution and the returned response.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b16"/><stop offset="1" stop-color="#0a0c13"/></linearGradient><linearGradient id="flow" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2aaaff"/><stop offset=".48" stop-color="#5a68ff"/><stop offset=".55" stop-color="#ff9d2f"/><stop offset="1" stop-color="#ff711f"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.card{fill:#081527;stroke:#298fff;stroke-width:2}.warm{fill:#17120d;stroke:#ff8d25;stroke-width:2}.h{font:700 24px Inter,Segoe UI,Arial;fill:#f5f8ff}.t{font:500 16px Inter,Segoe UI,Arial;fill:#b8c8df}.num{font:800 25px Inter,Segoe UI,Arial;fill:white}.s{font:600 15px Inter,Segoe UI,Arial;fill:#dbe8f8}</style></defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <text x="58" y="70" class="h" font-size="38">Request lifecycle</text><text x="58" y="104" class="t">From a user question to PowerShell output and back to ChatGPT</text>
  <path d="M100 410H1100" stroke="url(#flow)" stroke-width="5" fill="none" filter="url(#glow)"/>
  <g>
    <rect class="card" x="35" y="180" width="170" height="440" rx="20"/><rect class="card" x="225" y="180" width="170" height="440" rx="20"/><rect class="card" x="415" y="180" width="170" height="440" rx="20"/><rect class="warm" x="605" y="180" width="170" height="440" rx="20"/><rect class="warm" x="795" y="180" width="170" height="440" rx="20"/><rect class="warm" x="985" y="180" width="180" height="440" rx="20"/>
  </g>
  <g><circle cx="120" cy="180" r="30" fill="#1559ad" stroke="#49bfff" stroke-width="3"/><circle cx="310" cy="180" r="30" fill="#4036b2" stroke="#8175ff" stroke-width="3"/><circle cx="500" cy="180" r="30" fill="#09659c" stroke="#49bfff" stroke-width="3"/><circle cx="690" cy="180" r="30" fill="#7f420e" stroke="#ff9c30" stroke-width="3"/><circle cx="880" cy="180" r="30" fill="#7f420e" stroke="#ff9c30" stroke-width="3"/><circle cx="1075" cy="180" r="30" fill="#7f420e" stroke="#ff9c30" stroke-width="3"/><text x="113" y="189" class="num">1</text><text x="303" y="189" class="num">2</text><text x="493" y="189" class="num">3</text><text x="683" y="189" class="num">4</text><text x="873" y="189" class="num">5</text><text x="1068" y="189" class="num">6</text></g>
  <g class="h" text-anchor="middle"><text x="120" y="245"><tspan x="120">User asks in</tspan><tspan x="120" dy="28">ChatGPT</tspan></text><text x="310" y="245"><tspan x="310">Custom</tspan><tspan x="310" dy="28">Plugin</tspan></text><text x="500" y="245"><tspan x="500">App / MCP</tspan><tspan x="500" dy="28">Tools</tspan></text><text x="690" y="245"><tspan x="690">Cloudflare</tspan><tspan x="690" dy="28">Tunnel</tspan></text><text x="880" y="245"><tspan x="880">Windows</tspan><tspan x="880" dy="28">PC Agent</tspan></text><text x="1075" y="245"><tspan x="1075">Result back</tspan><tspan x="1075" dy="28">to ChatGPT</tspan></text></g>
  <g fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><path d="M80 340h80v54H80zM95 355h50M95 373h34" stroke="#38b6ff"/><path d="M278 335h64v64h-64zM295 355h30M295 375h22" stroke="#7d73ff"/><path d="M455 340h90M470 363h60M480 386h40" stroke="#38b6ff"/><path d="M650 385h80c15 0 25-10 25-23 0-15-11-25-26-25-6-18-22-30-42-30-25 0-45 18-48 42-14 1-24 12-24 27 0 5 1 7 3 9Z" stroke="#ff9d2f"/><path d="M835 330h90v68h-90zM865 398v20M845 418h70" stroke="#ff9d2f"/><path d="M1032 330h86v110h-86zM1047 353h55M1047 377h43M1047 401h50" stroke="#ff9d2f"/></g>
  <g class="t" text-anchor="middle"><text x="120" y="500"><tspan x="120">The request starts</tspan><tspan x="120" dy="22">inside regular Chat</tspan></text><text x="310" y="500"><tspan x="310">The plugin adds</tspan><tspan x="310" dy="22">tools and context</tspan></text><text x="500" y="500"><tspan x="500">The model selects</tspan><tspan x="500" dy="22">a structured tool</tspan></text><text x="690" y="500"><tspan x="690">HTTPS traffic goes</tspan><tspan x="690" dy="22">to localhost</tspan></text><text x="880" y="500"><tspan x="880">PowerShell or a</tspan><tspan x="880" dy="22">terminal executes</tspan></text><text x="1075" y="500"><tspan x="1075">Output becomes the</tspan><tspan x="1075" dy="22">next model input</tspan></text></g>
  <g fill="#091c32" stroke="#21507d"><rect x="60" y="555" width="120" height="42" rx="10"/><rect x="250" y="555" width="120" height="42" rx="10"/><rect x="440" y="555" width="120" height="42" rx="10"/></g><g fill="#25170d" stroke="#7b4219"><rect x="630" y="555" width="120" height="42" rx="10"/><rect x="820" y="555" width="120" height="42" rx="10"/><rect x="1015" y="555" width="120" height="42" rx="10"/></g>
  <g class="s" text-anchor="middle"><text x="120" y="581">Question</text><text x="310" y="581">Auth / context</text><text x="500" y="581">Tool call</text><text x="690" y="581">Secure route</text><text x="880" y="581">Execution</text><text x="1075" y="581">Response</text></g>
  <path d="M1080 650v78H120v-78" fill="none" stroke="#2aaaff" stroke-width="3" stroke-dasharray="9 9"/><path d="M120 650l-10 18h20Z" fill="#2aaaff"/><rect x="445" y="700" width="310" height="55" rx="15" fill="#071321" stroke="#2a8fe7"/><text x="600" y="734" class="s" text-anchor="middle">Response returned to ChatGPT</text>
  <g><circle cx="205" cy="410" r="8" fill="#42c3ff" filter="url(#glow)"/><circle cx="395" cy="410" r="8" fill="#42c3ff" filter="url(#glow)"/><circle cx="585" cy="410" r="8" fill="#42c3ff" filter="url(#glow)"/><circle cx="775" cy="410" r="8" fill="#ff9f31" filter="url(#glow)"/><circle cx="965" cy="410" r="8" fill="#ff9f31" filter="url(#glow)"/></g>
</svg>
