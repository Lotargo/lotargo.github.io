name: Import article assets

on:
  workflow_dispatch:
  push:
    paths:
      - '.asset-import/**/READY'

permissions:
  contents: write

concurrency:
  group: article-asset-import
  cancel-in-progress: false

jobs:
  import-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode staged asset bundle
        run: |
          python3 scripts/import_asset_bundle.py .asset-import/visual-novel-ai-game
          rm -f docs/.asset-pipeline-test*.txt docs/test.bin
          rm -rf blog/assets/visual-novel/hires

      - name: Commit extracted binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Import Visual Novel article assets"
          git push
