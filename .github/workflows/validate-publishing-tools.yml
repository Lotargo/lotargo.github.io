name: Validate publishing tools

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/article_bundle.py'
      - 'scripts/render_article.py'
      - 'scripts/publish_article.py'
      - 'templates/article.html'
      - 'tests/test_article_bundle.py'
      - 'tests/test_render_article.py'
      - 'schemas/article-bundle.schema.json'
      - 'requirements-publishing.txt'
      - '.github/workflows/validate-publishing-tools.yml'
  pull_request:
    paths:
      - 'scripts/article_bundle.py'
      - 'scripts/render_article.py'
      - 'scripts/publish_article.py'
      - 'templates/article.html'
      - 'tests/test_article_bundle.py'
      - 'tests/test_render_article.py'
      - 'schemas/article-bundle.schema.json'
      - 'requirements-publishing.txt'
      - '.github/workflows/validate-publishing-tools.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install publishing dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-publishing.txt

      - name: Compile publishing tools
        run: |
          python -m py_compile scripts/article_bundle.py
          python -m py_compile scripts/render_article.py
          python -m py_compile scripts/publish_article.py

      - name: Run publishing tests
        run: python -m unittest tests.test_article_bundle tests.test_render_article -v

      - name: Render and validate example bundle
        run: |
          rm -f examples/article-bundle/article.html
          python scripts/publish_article.py render examples/article-bundle
          python scripts/publish_article.py validate examples/article-bundle
