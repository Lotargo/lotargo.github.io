<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT remote PC plugin architecture</title>
  <desc id="desc">ChatGPT Chat connects through a custom plugin, App and MCP tools, Cloudflare Tunnel, and a Windows PC agent to PowerShell, files, and processes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b16"/><stop offset=".55" stop-color="#071425"/><stop offset="1" stop-color="#090b12"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#23a9ff"/><stop offset="1" stop-color="#6255ff"/></linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffb33a"/><stop offset="1" stop-color="#ff6b1a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".55"/></filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#1d4670" stroke-opacity=".14"/></pattern>
    <style>
      .card{fill:#081527;stroke:#238eff;stroke-width:2}.warm{fill:#17120d;stroke:#ff8a1f;stroke-width:2}.h{font:700 25px Inter,Segoe UI,Arial,sans-serif;fill:#f5f8ff}.t{font:500 17px Inter,Segoe UI,Arial,sans-serif;fill:#b8c8df}.s{font:600 15px Inter,Segoe UI,Arial,sans-serif;fill:#d8e6f8}.muted{fill:#7f94af}.lineB{stroke:#28a7ff}.lineO{stroke:#ff9229}.iconB{fill:none;stroke:#35b4ff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.iconO{fill:none;stroke:#ff9d2f;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M0 760 C260 680 430 850 690 748 S1110 650 1600 790V900H0Z" fill="#06162a" opacity=".9"/>
  <path d="M0 792 C290 690 460 860 740 760 S1130 690 1600 810" fill="none" stroke="url(#blue)" stroke-width="2" opacity=".45"/>
  <path d="M640 783 C900 700 1110 706 1600 830" fill="none" stroke="url(#orange)" stroke-width="2" opacity=".5"/>
  <text x="70" y="82" class="h" font-size="38">ChatGPT → Remote PC</text>
  <text x="70" y="116" class="t">Plugin, MCP tools, Cloudflare Tunnel, and a local Windows agent</text>

  <g filter="url(#shadow)">
    <rect class="card" x="45" y="170" width="220" height="520" rx="22"/>
    <rect class="card" x="295" y="170" width="220" height="520" rx="22"/>
    <rect class="card" x="545" y="170" width="220" height="520" rx="22"/>
    <rect class="warm" x="795" y="170" width="220" height="520" rx="22"/>
    <rect class="warm" x="1045" y="170" width="220" height="520" rx="22"/>
    <rect class="warm" x="1295" y="170" width="260" height="520" rx="22"/>
  </g>

  <g transform="translate(78 205)"><path class="iconB" d="M0 18c0-10 9-18 20-18h32c11 0 20 8 20 18v18c0 10-9 18-20 18H28L12 67l3-13C6 52 0 45 0 36Z"/><circle cx="23" cy="27" r="3" fill="#35b4ff"/><circle cx="36" cy="27" r="3" fill="#35b4ff"/><circle cx="49" cy="27" r="3" fill="#35b4ff"/></g>
  <text x="75" y="310" class="h">ChatGPT Chat</text>
  <rect x="70" y="345" width="170" height="84" rx="14" fill="#0c2a53"/><text x="86" y="375" class="s"><tspan x="86" dy="0">Inspect error logs</tspan><tspan x="86" dy="22">on my PC</tspan></text>
  <rect x="70" y="447" width="170" height="105" rx="14" fill="#0a1f39"/><text x="86" y="477" class="t"><tspan x="86">Calling the plugin</tspan><tspan x="86" dy="22">and gathering</tspan><tspan x="86" dy="22">real system data…</tspan></text>
  <rect x="70" y="620" width="170" height="38" rx="10" fill="#07111e" stroke="#244b71"/><text x="84" y="645" class="muted" font-family="Inter,Segoe UI,Arial" font-size="14">Message ChatGPT…</text>

  <g transform="translate(363 215)"><path d="M38 0h36v22c16-5 31 7 31 23s-15 28-31 23v38H36V83c5 1 9 2 13 0 12-5 13-22 2-29-5-3-10-3-15-1V22H0V0Z" fill="url(#blue)" filter="url(#glow)"/></g>
  <text x="325" y="310" class="h">Custom Plugin</text>
  <rect x="320" y="360" width="170" height="62" rx="12" fill="#0b203b"/><text x="340" y="397" class="s">Auth &amp; context</text>
  <rect x="320" y="438" width="170" height="62" rx="12" fill="#0b203b"/><text x="340" y="475" class="s">Tool orchestration</text>
  <rect x="320" y="516" width="170" height="62" rx="12" fill="#0b203b"/><text x="340" y="553" class="s">Response framing</text>
  <text x="320" y="625" class="t"><tspan x="320">Installed entry point</tspan><tspan x="320" dy="22">inside ChatGPT</tspan></text>

  <g transform="translate(577 210)" class="iconB"><path d="M0 8h58v64H0z"/><path d="M15 25h28M15 38h28M15 51h20"/><path d="M70 8h58v64H70z"/><path d="M86 25h25M86 38h20M86 51h29"/></g>
  <text x="575" y="310" class="h">App / MCP Tools</text>
  <g class="s"><rect x="570" y="345" width="170" height="58" rx="12" fill="#09213c"/><text x="590" y="381">File tools</text><rect x="570" y="417" width="170" height="58" rx="12" fill="#09213c"/><text x="590" y="453">Process tools</text><rect x="570" y="489" width="170" height="58" rx="12" fill="#09213c"/><text x="590" y="525">Shell tools</text><rect x="570" y="561" width="170" height="58" rx="12" fill="#09213c"/><text x="590" y="597">System info</text></g>

  <g transform="translate(850 220)" class="iconO"><path d="M18 68h88c18 0 30-12 30-28s-12-29-29-29c-6-15-20-25-38-25-23 0-42 17-44 39C10 27 0 38 0 48s8 20 18 20Z"/><path d="M32 45h72M45 31l-13 14 13 14M91 31l13 14-13 14"/></g>
  <text x="825" y="310" class="h">Cloudflare Tunnel</text>
  <rect x="820" y="370" width="170" height="54" rx="12" fill="#22160c"/><text x="840" y="403" class="s">Encrypted transport</text>
  <rect x="820" y="440" width="170" height="54" rx="12" fill="#22160c"/><text x="840" y="473" class="s">Outbound-only</text>
  <rect x="820" y="510" width="170" height="54" rx="12" fill="#22160c"/><text x="840" y="543" class="s">No public PC port</text>
  <text x="820" y="620" class="t"><tspan x="820">Public HTTPS endpoint</tspan><tspan x="820" dy="22">mapped to localhost</tspan></text>

  <g transform="translate(1100 210)"><rect x="0" y="0" width="120" height="88" rx="10" fill="#081b30" stroke="#ff962a" stroke-width="4"/><rect x="42" y="88" width="36" height="14" fill="#ff962a"/><rect x="25" y="102" width="70" height="8" rx="4" fill="#ff962a"/><path d="M47 22h24v24H47zM73 22h24v24H73zM47 48h24v24H47zM73 48h24v24H73z" fill="#29aaff"/></g>
  <text x="1075" y="340" class="h">Windows PC Agent</text>
  <rect x="1070" y="375" width="170" height="54" rx="12" fill="#22160c"/><text x="1090" y="408" class="s">MCP HTTP server</text>
  <rect x="1070" y="445" width="170" height="54" rx="12" fill="#22160c"/><text x="1090" y="478" class="s">Runspace + ConPTY</text>
  <rect x="1070" y="515" width="170" height="54" rx="12" fill="#22160c"/><text x="1090" y="548" class="s">Process manager</text>
  <text x="1070" y="620" class="t"><tspan x="1070">Persistent service</tspan><tspan x="1070" dy="22">on the user machine</tspan></text>

  <text x="1325" y="225" class="h">PowerShell / Terminal</text><text x="1325" y="257" class="h">Files / Processes</text>
  <rect x="1320" y="290" width="210" height="165" rx="12" fill="#04080d" stroke="#773b13"/><text x="1338" y="320" font-family="Consolas,monospace" font-size="14" fill="#71d46f">PS C:\&gt; Get-Process</text><text x="1338" y="349" font-family="Consolas,monospace" font-size="12" fill="#d7e0eb">Name       CPU   Memory</text><text x="1338" y="374" font-family="Consolas,monospace" font-size="12" fill="#b9c6d5">explorer   1.2   120 MB</text><text x="1338" y="397" font-family="Consolas,monospace" font-size="12" fill="#b9c6d5">code       7.1   420 MB</text><text x="1338" y="420" font-family="Consolas,monospace" font-size="12" fill="#b9c6d5">pwsh       0.3    86 MB</text>
  <rect x="1320" y="472" width="210" height="78" rx="12" fill="#0c1119" stroke="#773b13"/><text x="1338" y="500" class="s">Files</text><text x="1338" y="527" class="t">error.log · app.log · report.txt</text>
  <rect x="1320" y="565" width="210" height="78" rx="12" fill="#0c1119" stroke="#773b13"/><text x="1338" y="593" class="s">Processes</text><text x="1338" y="620" class="t">list · start · poll · stop</text>

  <g fill="none" stroke-width="4" filter="url(#glow)"><path d="M265 430H295" class="lineB"/><path d="M515 430H545" class="lineB"/><path d="M765 430H795" class="lineB"/><path d="M1015 430H1045" class="lineO"/><path d="M1265 430H1295" class="lineO"/></g>
  <g><circle cx="280" cy="430" r="9" fill="#43c3ff" filter="url(#glow)"/><circle cx="530" cy="430" r="9" fill="#43c3ff" filter="url(#glow)"/><circle cx="780" cy="430" r="9" fill="#43c3ff" filter="url(#glow)"/><circle cx="1030" cy="430" r="9" fill="#ff9f31" filter="url(#glow)"/><circle cx="1280" cy="430" r="9" fill="#ff9f31" filter="url(#glow)"/></g>
  <text x="70" y="835" class="t">Concept architecture · personal endpoint first, multi-device gateway later</text>
</svg>
