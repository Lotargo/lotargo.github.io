<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Windows PC Agent architecture</title><desc id="desc">A central Windows PC Agent connected to an MCP server, PowerShell Runspace, ConPTY terminal, process manager, file transfer, and cloudflared tunnel.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b16"/><stop offset="1" stop-color="#090c13"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.box{fill:#081527;stroke:#2b9cff;stroke-width:2}.warm{fill:#17120d;stroke:#ff8d25;stroke-width:2}.h{font:700 25px Inter,Segoe UI,Arial;fill:#f5f8ff}.t{font:500 16px Inter,Segoe UI,Arial;fill:#b8c8df}.s{font:600 15px Inter,Segoe UI,Arial;fill:#d9e7f7}.b{stroke:#31afff}.o{stroke:#ff962a}</style></defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <text x="55" y="70" class="h" font-size="38">Windows PC Agent</text><text x="55" y="104" class="t">Local execution layer behind the plugin and MCP endpoint</text>
  <g fill="none" stroke-width="3"><path d="M400 360H320V230" class="b"/><path d="M400 430H320V430" class="b"/><path d="M400 500H320V630" class="b"/><path d="M800 360h80V230" class="b"/><path d="M800 430h80V430" class="b"/><path d="M800 500h80V630" class="o"/></g>
  <g><rect class="box" x="400" y="275" width="400" height="320" rx="28" filter="url(#glow)"/><rect x="520" y="325" width="160" height="115" rx="14" fill="#06111f" stroke="#32afff" stroke-width="3"/><path d="M555 350h42v34h-42zM603 350h42v34h-42zM555 390h42v34h-42zM603 390h42v34h-42z" fill="#2aaaff"/><text x="600" y="490" class="h" text-anchor="middle" font-size="34">Windows PC Agent</text><text x="600" y="530" class="t" text-anchor="middle">service + desktop companion</text><rect x="532" y="550" width="136" height="30" rx="15" fill="#25170d" stroke="#ff9229"/><text x="600" y="571" class="s" text-anchor="middle">localhost only</text></g>
  <g><rect class="box" x="50" y="145" width="270" height="170" rx="20"/><text x="80" y="190" class="h">MCP HTTP Server</text><text x="80" y="225" class="t"><tspan x="80">• tool discovery</tspan><tspan x="80" dy="25">• JSON-RPC / HTTP</tspan><tspan x="80" dy="25">• session routing</tspan></text>
  <rect class="box" x="50" y="345" width="270" height="170" rx="20"/><text x="80" y="390" class="h">ConPTY Terminal</text><text x="80" y="425" class="t"><tspan x="80">• interactive shell</tspan><tspan x="80" dy="25">• streaming I/O</tspan><tspan x="80" dy="25">• resize / signals</tspan></text>
  <rect class="box" x="50" y="545" width="270" height="170" rx="20"/><text x="80" y="590" class="h">File Transfer</text><text x="80" y="625" class="t"><tspan x="80">• read / write / list</tspan><tspan x="80" dy="25">• upload / download</tspan><tspan x="80" dy="25">• chunked transfer</tspan></text></g>
  <g><rect class="box" x="880" y="145" width="270" height="170" rx="20"/><text x="910" y="190" class="h">PowerShell Runspace</text><text x="910" y="225" class="t"><tspan x="910">• command execution</tspan><tspan x="910" dy="25">• objects and errors</tspan><tspan x="910" dy="25">• persistent context</tspan></text>
  <rect class="box" x="880" y="345" width="270" height="170" rx="20"/><text x="910" y="390" class="h">Process Manager</text><text x="910" y="425" class="t"><tspan x="910">• start / poll / stop</tspan><tspan x="910" dy="25">• stdout / stderr</tspan><tspan x="910" dy="25">• resource status</tspan></text>
  <rect class="warm" x="880" y="545" width="270" height="170" rx="20"/><text x="910" y="590" class="h">cloudflared / Tunnel</text><text x="910" y="625" class="t"><tspan x="910">• outbound connection</tspan><tspan x="910" dy="25">• encrypted transport</tspan><tspan x="910" dy="25">• public hostname</tspan></text></g>
  <path d="M600 595v75" stroke="#ff962a" stroke-width="4" filter="url(#glow)"/><path d="M520 710h160c25 0 40-15 40-35 0-22-17-38-39-38-9-27-34-46-65-46-38 0-69 28-73 65-22 2-38 19-38 40 0 8 5 14 15 14Z" fill="#1e130a" stroke="#ff962a" stroke-width="3"/>
  <text x="600" y="750" class="s" text-anchor="middle">Encrypted tunnel</text>
  <rect x="230" y="790" width="740" height="75" rx="20" fill="#120e0a" stroke="#ff8d25" stroke-width="2" stroke-dasharray="8 6"/><g class="h" font-size="22"><text x="315" y="825">Files</text><text x="540" y="825">Processes</text><text x="760" y="825">Terminal sessions</text></g><g class="t"><text x="315" y="850">list · read · write</text><text x="540" y="850">start · poll · stop</text><text x="760" y="850">interactive ConPTY</text></g>
  <g fill="#3ac1ff"><circle cx="400" cy="360" r="8"/><circle cx="400" cy="430" r="8"/><circle cx="400" cy="500" r="8"/><circle cx="800" cy="360" r="8"/><circle cx="800" cy="430" r="8"/></g><circle cx="800" cy="500" r="8" fill="#ff9a2d"/>
</svg>
