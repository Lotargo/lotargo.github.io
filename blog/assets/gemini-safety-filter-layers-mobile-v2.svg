<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1500" role="img" aria-labelledby="title desc">
  <title id="title">Filter Matryoshka mobile banner</title>
  <desc id="desc">Mobile banner in the Logs ≠ Memory visual language with a red shield warning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.55" stop-color="#101010"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
    </filter>
    <marker id="arrowD" viewBox="0 0 8 8" refX="4" refY="7" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 8 4 0 8Z" fill="#e8e8e3" opacity="0.78" transform="rotate(90 4 4)"/>
    </marker>
  </defs>

  <rect width="1080" height="1500" fill="url(#bg)"/>
  <g opacity="0.1" stroke="#efefe9" stroke-width="1">
    <path d="M0 120H1080M0 240H1080M0 360H1080M0 480H1080M0 600H1080M0 720H1080M0 840H1080M0 960H1080M0 1080H1080M0 1200H1080M0 1320H1080"/>
    <path d="M90 0V1500M180 0V1500M270 0V1500M360 0V1500M450 0V1500M540 0V1500M630 0V1500M720 0V1500M810 0V1500M900 0V1500M990 0V1500"/>
  </g>
  <rect width="1080" height="1500" filter="url(#grain)" opacity="0.28"/>

  <text x="68" y="96" fill="#91918b" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">DEFENSIVE NOTE / LLM SAFETY PIPELINE</text>
  <text x="68" y="196" fill="#efefe9" font-family="Inter, Segoe UI, sans-serif" font-size="88" font-weight="950" letter-spacing="-4">FILTER</text>
  <text x="68" y="286" fill="none" stroke="#efefe9" stroke-width="2" font-family="Inter, Segoe UI, sans-serif" font-size="88" font-weight="950" letter-spacing="-4">MATRYOSHKA</text>
  <text x="68" y="338" fill="#b4b4ad" font-family="Inter, Segoe UI, sans-serif" font-size="27">Input checks, reasoning traces, final output,</text>
  <text x="68" y="372" fill="#b4b4ad" font-family="Inter, Segoe UI, sans-serif" font-size="27">and the gap between them.</text>

  <g transform="translate(646 126)" opacity="0.9">
    <path d="M96 0 188 38v86c0 72-39 124-92 154C39 248 0 196 0 124V38Z" fill="#120707" stroke="#ff5a5f" stroke-width="4"/>
    <path d="M58 110 92 144 146 76" fill="none" stroke="#ff5a5f" stroke-width="13" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>
  <text x="676" y="412" fill="#ff5a5f" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800" letter-spacing="2.4">RED ATTACK</text>
  <text x="676" y="438" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800" letter-spacing="2.4">FINAL MODERATION</text>

  <g transform="translate(68 500)">
    <rect width="944" height="132" fill="#0d0d0d" stroke="#5f5f5a"/>
    <g opacity="0.72" stroke="#efefe9" fill="none" stroke-width="1.4">
      <rect x="26" y="26" width="40" height="26"/>
      <path d="M32 62h30M32 72h24M32 82h18"/>
    </g>
    <text x="90" y="40" fill="#ff6b70" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">01 / INPUT</text>
    <text x="90" y="80" fill="#efefe9" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">prompt tokens</text>
    <text x="90" y="112" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16">explicit markers are easy</text>
  </g>
  <path d="M540 632V686" fill="none" stroke="#efefe9" stroke-opacity="0.75" stroke-width="1.2" marker-end="url(#arrowD)"/>

  <g transform="translate(68 704)">
    <rect width="944" height="132" fill="#0d0d0d" stroke="#5f5f5a"/>
    <g opacity="0.72" stroke="#efefe9" fill="none" stroke-width="1.4">
      <circle cx="38" cy="38" r="7"/>
      <circle cx="38" cy="76" r="7"/>
      <circle cx="64" cy="57" r="7"/>
      <path d="M44 42 58 53M44 72 58 61M71 57h14"/>
    </g>
    <text x="90" y="40" fill="#ff6b70" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">02 / TRACE</text>
    <text x="90" y="80" fill="#efefe9" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">reasoning layer</text>
    <text x="90" y="112" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16">intent may surface here</text>
  </g>
  <path d="M540 836V890" fill="none" stroke="#efefe9" stroke-opacity="0.75" stroke-width="1.2" marker-end="url(#arrowD)"/>

  <g transform="translate(68 908)">
    <rect width="944" height="132" fill="#0d0d0d" stroke="#5f5f5a"/>
    <g opacity="0.72" stroke="#efefe9" fill="none" stroke-width="1.4">
      <rect x="28" y="22" width="34" height="44"/>
      <path d="M34 36h22M34 46h18M34 56h24M34 66h14"/>
    </g>
    <text x="90" y="40" fill="#ff6b70" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">03 / OUTPUT</text>
    <text x="90" y="80" fill="#efefe9" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">candidate text</text>
    <text x="90" y="112" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16">must be checked again</text>
  </g>
  <path d="M540 1040V1094" fill="none" stroke="#efefe9" stroke-opacity="0.75" stroke-width="1.2" marker-end="url(#arrowD)"/>

  <g transform="translate(68 1112)">
    <rect width="944" height="132" fill="#15090a" stroke="#ff5a5f"/>
    <g opacity="0.86" stroke="#ff5a5f" fill="none" stroke-width="1.5">
      <path d="M28 28h38v38H28z"/>
      <path d="M36 36 58 58M58 36 36 58"/>
    </g>
    <text x="90" y="40" fill="#ff6b70" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">04 / GAP</text>
    <text x="90" y="80" fill="#efefe9" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">mismatch</text>
    <text x="90" y="112" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16">control-plane drift</text>
  </g>

  <path d="M68 1318H1012" stroke="#efefe9" stroke-opacity="0.18"/>
  <text x="68" y="1368" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16" letter-spacing="1.6">NO PAYLOADS. NO EXPLOIT PROMPTS.</text>
  <text x="68" y="1394" fill="#8f8f89" font-family="JetBrains Mono, Consolas, monospace" font-size="16" letter-spacing="1.6">REPRODUCIBILITY WITHOUT OPERATIONAL ABUSE.</text>
</svg>