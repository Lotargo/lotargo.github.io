<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1500" role="img" aria-labelledby="title desc">
  <title id="title">Filter Matryoshka mobile banner</title>
  <desc id="desc">Mobile-oriented version of the safety layers banner with a vertical flow and large readable labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040404"/>
      <stop offset="0.5" stop-color="#101010"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="hot" cx="70%" cy="14%" r="48%">
      <stop offset="0" stop-color="#ff7676" stop-opacity="0.32"/>
      <stop offset="0.4" stop-color="#ff7676" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff7676" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.1"/></feComponentTransfer>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="10" orient="auto">
      <path d="M0 0 12 10 0 20Z" fill="#f5f5f0" opacity="0.76"/>
    </marker>
  </defs>
  <rect width="1080" height="1500" fill="url(#bg)"/>
  <rect width="1080" height="1500" fill="url(#hot)"/>
  <g opacity="0.11" stroke="#f5f5f0" stroke-width="1">
    <path d="M0 120H1080M0 240H1080M0 360H1080M0 480H1080M0 600H1080M0 720H1080M0 840H1080M0 960H1080M0 1080H1080M0 1200H1080M0 1320H1080"/>
    <path d="M90 0V1500M180 0V1500M270 0V1500M360 0V1500M450 0V1500M540 0V1500M630 0V1500M720 0V1500M810 0V1500M900 0V1500M990 0V1500"/>
  </g>
  <rect width="1080" height="1500" filter="url(#grain)" opacity="0.3"/>

  <text x="68" y="96" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">DEFENSIVE NOTE / LLM SAFETY PIPELINE</text>
  <text x="68" y="196" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="88" font-weight="950" letter-spacing="-4">FILTER</text>
  <text x="68" y="286" fill="none" stroke="#f5f5f0" stroke-width="2" font-family="Inter, Segoe UI, sans-serif" font-size="88" font-weight="950" letter-spacing="-4">MATRYOSHKA</text>
  <text x="68" y="338" fill="#b9b9b2" font-family="Inter, Segoe UI, sans-serif" font-size="27">Input checks, reasoning traces, final output,</text>
  <text x="68" y="372" fill="#b9b9b2" font-family="Inter, Segoe UI, sans-serif" font-size="27">and the gap between them.</text>

  <g transform="translate(660 104)" filter="url(#glow)">
    <path d="M92 0 184 38v84c0 70-38 120-92 148C38 242 0 192 0 122V38Z" fill="#ff7676" fill-opacity="0.08" stroke="#ff7676" stroke-width="3"/>
    <path d="M56 112 90 146 144 78" fill="none" stroke="#ff7676" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>
  <text x="682" y="408" fill="#b9b9b2" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800" letter-spacing="2.5">INDEPENDENT FINAL</text>
  <text x="682" y="432" fill="#b9b9b2" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800" letter-spacing="2.5">MODERATION</text>

  <g transform="translate(68 474)">
    <rect width="944" height="132" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="26" y="40" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">01 / INPUT</text>
    <text x="26" y="80" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">prompt tokens</text>
    <text x="26" y="112" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16">explicit markers are easy</text>
  </g>
  <g fill="none" stroke="#f5f5f0" stroke-width="2" marker-end="url(#arrow)" opacity="0.76"><path d="M540 606V660"/></g>

  <g transform="translate(68 678)">
    <rect width="944" height="132" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="26" y="40" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">02 / TRACE</text>
    <text x="26" y="80" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">reasoning layer</text>
    <text x="26" y="112" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16">intent may surface here</text>
  </g>
  <g fill="none" stroke="#f5f5f0" stroke-width="2" marker-end="url(#arrow)" opacity="0.76"><path d="M540 810V864"/></g>

  <g transform="translate(68 882)">
    <rect width="944" height="132" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="26" y="40" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">03 / OUTPUT</text>
    <text x="26" y="80" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">candidate text</text>
    <text x="26" y="112" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16">must be checked again</text>
  </g>
  <g fill="none" stroke="#f5f5f0" stroke-width="2" marker-end="url(#arrow)" opacity="0.76"><path d="M540 1014V1068"/></g>

  <g transform="translate(68 1086)">
    <rect width="944" height="132" fill="#140909" stroke="#ff7676" stroke-opacity="0.82"/>
    <text x="26" y="40" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="900" letter-spacing="3">04 / GAP</text>
    <text x="26" y="80" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="36" font-weight="860">mismatch</text>
    <text x="26" y="112" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16">control-plane drift</text>
  </g>

  <path d="M68 1298H1012" stroke="#ffffff" stroke-opacity="0.2"/>
  <text x="68" y="1350" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16" letter-spacing="1.6">NO PAYLOADS. NO EXPLOIT PROMPTS.</text>
  <text x="68" y="1376" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="16" letter-spacing="1.6">REPRODUCIBILITY WITHOUT OPERATIONAL ABUSE.</text>
</svg>
