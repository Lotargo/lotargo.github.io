<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Filter Matryoshka tablet banner</title>
  <desc id="desc">Tablet-oriented version of the safety layers banner with a clearer two-row layout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040404"/>
      <stop offset="0.5" stop-color="#0f0f0f"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="hot" cx="72%" cy="18%" r="48%">
      <stop offset="0" stop-color="#ff7676" stop-opacity="0.34"/>
      <stop offset="0.4" stop-color="#ff7676" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ff7676" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.1"/></feComponentTransfer>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 12 6 0 12Z" fill="#f5f5f0" opacity="0.76"/>
    </marker>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#hot)"/>
  <g opacity="0.11" stroke="#f5f5f0" stroke-width="1">
    <path d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600M0 840H1600M0 960H1600M0 1080H1600"/>
    <path d="M100 0V1200M200 0V1200M300 0V1200M400 0V1200M500 0V1200M600 0V1200M700 0V1200M800 0V1200M900 0V1200M1000 0V1200M1100 0V1200M1200 0V1200M1300 0V1200M1400 0V1200M1500 0V1200"/>
  </g>
  <rect width="1600" height="1200" filter="url(#grain)" opacity="0.3"/>

  <text x="96" y="110" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="20" font-weight="800" letter-spacing="4">DEFENSIVE NOTE / LLM SAFETY PIPELINE</text>
  <text x="96" y="230" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="96" font-weight="950" letter-spacing="-4">FILTER</text>
  <text x="96" y="326" fill="none" stroke="#f5f5f0" stroke-width="2" font-family="Inter, Segoe UI, sans-serif" font-size="96" font-weight="950" letter-spacing="-4">MATRYOSHKA</text>
  <text x="96" y="384" fill="#b9b9b2" font-family="Inter, Segoe UI, sans-serif" font-size="30">Input checks, reasoning traces, final output, and the gap between them.</text>

  <g transform="translate(1040 100)" filter="url(#glow)">
    <path d="M170 0 330 66v146c0 122-66 207-160 255C76 419 10 334 10 212V66Z" fill="#ff7676" fill-opacity="0.08" stroke="#ff7676" stroke-width="3"/>
    <path d="M112 204 164 256 260 136" fill="none" stroke="#ff7676" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter"/>
    <text x="30" y="542" fill="#b9b9b2" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">INDEPENDENT FINAL</text>
    <text x="30" y="570" fill="#b9b9b2" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" letter-spacing="3">MODERATION</text>
  </g>

  <g transform="translate(96 570)">
    <rect width="620" height="168" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="28" y="44" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900" letter-spacing="3">01 / INPUT</text>
    <text x="28" y="92" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="860">prompt tokens</text>
    <text x="28" y="132" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18">explicit markers are easy</text>
  </g>
  <g transform="translate(882 570)">
    <rect width="620" height="168" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="28" y="44" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900" letter-spacing="3">02 / TRACE</text>
    <text x="28" y="92" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="860">reasoning layer</text>
    <text x="28" y="132" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18">intent may surface here</text>
  </g>
  <g fill="none" stroke="#f5f5f0" stroke-width="2" marker-end="url(#arrow)" opacity="0.76">
    <path d="M716 654H848"/>
    <path d="M404 754V822"/>
    <path d="M1192 754V822"/>
  </g>

  <g transform="translate(96 826)">
    <rect width="620" height="168" fill="#070707" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="28" y="44" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900" letter-spacing="3">03 / OUTPUT</text>
    <text x="28" y="92" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="860">candidate text</text>
    <text x="28" y="132" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18">must be checked again</text>
  </g>
  <g transform="translate(882 826)">
    <rect width="620" height="168" fill="#140909" stroke="#ff7676" stroke-opacity="0.82"/>
    <text x="28" y="44" fill="#ff7676" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="900" letter-spacing="3">04 / GAP</text>
    <text x="28" y="92" fill="#f5f5f0" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="860">mismatch</text>
    <text x="28" y="132" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18">control-plane drift</text>
  </g>

  <path d="M96 1044H1504" stroke="#ffffff" stroke-opacity="0.2"/>
  <text x="96" y="1092" fill="#8c8c88" font-family="JetBrains Mono, Consolas, monospace" font-size="18" letter-spacing="2">NO PAYLOADS. NO EXPLOIT PROMPTS. REPRODUCIBILITY WITHOUT OPERATIONAL ABUSE.</text>
</svg>
