<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="$description_en" />
  <meta name="theme-color" content="#000000" />
  <title>$title_en · Lotargo Blog</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/img/favicon.svg" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('lotargo-theme');
        document.documentElement.dataset.theme = savedTheme || 'dark';
      } catch (error) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>
<body data-title-en="$title_en · Lotargo Blog" data-title-ru="$title_ru · Блог Lotargo">
  <header class="site-header" data-js="header">
    <a class="brand" href="../../" aria-label="Back to landing">
      <span class="brand-mark" aria-hidden="true">LØ</span>
      <span class="brand-text">Lotargo</span>
    </a>
    <div class="header-controls">
      <nav class="nav" aria-label="Post navigation">
        <a href="../../" data-i18n="blog-nav-home">Home</a>
        <a href="../" data-i18n="nav-blog">Blog</a>
        <a href="../../#projects" data-i18n="nav-projects">Projects</a>
      </nav>
      <button class="theme-toggle" type="button" data-js="theme-toggle" aria-label="Switch color theme">
        <span data-js="theme-label">Theme</span>
      </button>
      <button class="lang-toggle" type="button" data-js="lang-toggle" aria-label="Switch language">
        <span data-js="lang-label">EN</span>
      </button>
    </div>
  </header>

  <main id="top" class="post-shell">
    <article class="post-article" data-generated-from-markdown="true" data-article-slug="$slug">
      <div class="post-toolbar">
        <a class="post-back" href="../" data-i18n="post-back-blog">Back to blog</a>
        <div class="post-meta">
          <span>$date</span>
          <span data-lang-content="en">$type_en</span>
          <span data-lang-content="ru">$type_ru</span>
        </div>
      </div>

      <div data-lang-content="en">
        <h1>$title_en</h1>
$body_en
      </div>

      <div data-lang-content="ru">
        <h1>$title_ru</h1>
$body_ru
      </div>

      <nav class="post-pagination" aria-label="Post navigation" data-i18n-aria="post-pagination-aria">
        <span class="post-page-link is-disabled" aria-disabled="true">
          <span data-i18n="post-prev">Previous</span>
          <strong data-i18n="post-prev-none">No earlier post</strong>
        </span>
        <span class="post-page-link is-disabled" aria-disabled="true">
          <span data-i18n="post-next">Next</span>
          <strong data-i18n="post-next-none">No later post</strong>
        </span>
      </nav>
    </article>
  </main>

  <footer class="site-footer">
    <span>Oleg Boyko / Lotargo</span>
    <span>Blog · AI systems · verification</span>
  </footer>
  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/blog-post.js"></script>
</body>
</html>
